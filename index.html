<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 通報格式產生器 v6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>LINE 通報格式產生器</h2>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="tab-general">一般模式</button>
            <button class="tab-btn" data-tab="tab-weekly">模板模式</button>
            <button class="tab-btn" data-tab="tab-announcement">公告模式</button>
        </div>

        <!-- 一般模式 -->
        <div id="tab-general" class="tab-content active">
            <div class="form-group">
                <label>重要性標記</label>
                <div class="checkbox-container">
                    <label class="checkbox-item"><input type="checkbox" id="is_important">標記為「重要」</label>
                </div>
            </div>

            <div class="form-group">
                <label>通報單位</label>
                <input type="text" id="unit" placeholder="例如：人事室、資訊處">
            </div>

            <div class="form-group">
                <label>案由 (主旨) *</label>
                <input type="text" id="subject" placeholder="請輸入重要主旨">
            </div>

            <div class="form-group">
                <label>繳交期限</label>
                <input type="datetime-local" id="deadline">
                <div class="deadline-helper">
                    <select id="deadline_date_label">
                        <option value="">日期補充 (無)</option>
                        <option value="(今天)">(今天)</option>
                        <option value="(明天)">(明天)</option>
                        <option value="---" disabled>── 本週 ──</option>
                        <option value="(本週三)">(本週三)</option>
                        <option value="(本週四)">(本週四)</option>
                        <option value="(本週五)">(本週五)</option>
                        <option value="(本週內)">(本週內)</option>
                        <option value="(盡速)">(盡速)</option>
                        <option value="---" disabled>── 下週 ──</option>
                        <option value="(下週一)">(下週一)</option>
                        <option value="(下週二)">(下週二)</option>
                        <option value="(下週三)">(下週三)</option>
                        <option value="(下週四)">(下週四)</option>
                        <option value="(下週五)">(下週五)</option>
                    </select>
                    <select id="deadline_time_label">
                        <option value="">時間補充 (無)</option>
                        <option value="中午前">中午前</option>
                        <option value="下班前">下班前</option>
                        <option value="會議前">會議前</option>
                        <option value="下班後">下班後</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>繳交方式 (可多選)</label>
                <select id="method_requirement">
                    <option value="(都要)">(都要)</option>
                    <option value="(任選一種)">(任選一種)</option>
                </select>
                <div class="checkbox-container">
                    <label class="checkbox-item"><input type="checkbox" name="method" value="紙本核章">紙本核章</label>
                    <label class="checkbox-item"><input type="checkbox" name="method" value="線上表單">線上表單</label>
                    <label class="checkbox-item"><input type="checkbox" name="method" value="檔案回傳">檔案回傳</label>
                </div>
            </div>

            <div class="form-group">
                <label>詳細說明</label>
                <textarea id="description" rows="3" placeholder="請輸入具體細節內容..."></textarea>
            </div>

            <div class="form-group">
                <label>相關備註 (可多選)</label>
                <div class="checkbox-container">
                    <label class="checkbox-item"><input type="checkbox" name="note_opt" value="無意見亦請回復無">無意見需回覆</label>
                    <label class="checkbox-item"><input type="checkbox" name="note_opt" value="逾期不候">逾期不候</label>
                    <label class="checkbox-item"><input type="checkbox" name="note_opt" value="請依限回覆，以利後續彙整作業">請依限回覆</label>
                    <label class="checkbox-item"><input type="checkbox" name="note_opt" value="本案為預行通知，公文隨後補發">公文後補</label>
                    <label class="checkbox-item full-width"><input type="checkbox" name="note_opt" value="請涉及以上項目單位回覆後，經科長核章送處總務彙整">經科長核章送處總務彙整</label>
                </div>
                <div id="custom-notes-container-general"></div>
                <button type="button" class="secondary-btn add-note-btn" data-container="custom-notes-container-general">+ 增加自定義備註</button>
            </div>
        </div>

        <!-- 模板模式 (原週報模式) -->
        <div id="tab-weekly" class="tab-content">
            <div class="form-group">
                <label>選擇模板</label>
                <select id="template_select">
                    <option value="dept_meeting">處務會議資料填報</option>
                    <option value="mayor_weekly">本週市長週報</option>
                    <option value="industry_mayor_brief">產發處市長面報</option>
                </select>
            </div>

            <div class="form-group">
                <label>重要性標記</label>
                <div class="checkbox-container">
                    <label class="checkbox-item"><input type="checkbox" id="weekly_is_important" checked>標記為「重要」</label>
                </div>
            </div>

            <div class="form-group">
                <label>案由</label>
                <input type="text" id="weekly_subject" value="處務會議資料填報">
            </div>

            <div class="form-group">
                <label>繳交期限</label>
                <input type="datetime-local" id="weekly_deadline">
                <div class="deadline-helper">
                    <select id="weekly_deadline_date_label">
                        <option value="">日期補充 (無)</option>
                        <option value="(今天)">(今天)</option>
                        <option value="(明天)" selected>(明天)</option>
                        <option value="(本週內)">(本週內)</option>
                        <option value="(盡速)">(盡速)</option>
                        <option value="(下週一)">(下週一)</option>
                    </select>
                    <select id="weekly_deadline_time_label">
                        <option value="">時間補充 (無)</option>
                        <option value="中午前" selected>中午前</option>
                        <option value="下班前">下班前</option>
                    </select>
                </div>
            </div>

            <div id="dept_meeting_fields">
                <div class="form-group">
                    <label>會議時間 (說明第1點)</label>
                    <input type="text" id="weekly_meeting_time" placeholder="例如：明天(4/28)下午02:00">
                </div>
            </div>

            <!-- 產發處市長面報專用欄位 -->
            <div id="industry_mayor_brief_fields" style="display: none;">
                <div class="form-group">
                    <label>報告事項</label>
                    <textarea id="industry_report_items" rows="8">1. 風箏節目前進度
2. 科技產業論壇籌辦進度
3. 香山狗狗公園開工典禮籌備進度與流程安排(已交)
4. 購物節目前進度
5. 濕地藝術季目前規劃(已交)
6. 市場加倍券的內容與期程
7. 其他產發處擬請示事項</textarea>
                </div>
            </div>

            <div class="form-group" id="cloud_link_group">
                <label id="cloud_link_label">雲端連結 (說明第2點)</label>
                <input type="text" id="weekly_cloud_link" placeholder="請貼上連結">
            </div>

            <div class="form-group">
                <label>相關備註 (可多選)</label>
                <div class="checkbox-container">
                    <label class="checkbox-item"><input type="checkbox" name="weekly_note_opt" value="請依限回覆，以利後續彙整作業">請依限回覆</label>
                    <label class="checkbox-item"><input type="checkbox" name="weekly_note_opt" value="逾期不候">逾期不候</label>
                </div>
                <div id="custom-notes-container-weekly"></div>
                <button type="button" class="secondary-btn add-note-btn" data-container="custom-notes-container-weekly">+ 增加自定義備註</button>
            </div>
        </div>

        <!-- 公告模式 -->
        <div id="tab-announcement" class="tab-content">
            <div class="form-group">
                <label>重要性標記</label>
                <div class="checkbox-container">
                    <label class="checkbox-item"><input type="checkbox" id="ann_is_important">標記為「重要」</label>
                </div>
            </div>

            <div class="form-group">
                <label>公告標題 (案由) *</label>
                <input type="text" id="ann_subject" placeholder="請輸入公告標題">
            </div>

            <div class="form-group">
                <label>公告內容 (詳細說明)</label>
                <textarea id="ann_description" rows="6" placeholder="請輸入公告具體內容..."></textarea>
            </div>
        </div>

        <button type="button" id="generate-btn">產生並自動複製</button>

        <div id="result-container">
            <span class="result-label">預覽結果：</span>
            <div id="result"></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
