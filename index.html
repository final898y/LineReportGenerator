<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 通報格式產生器 v6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>LINE 通報格式產生器</h2>
        
        <div class="form-group">
            <label>重要性標記</label>
            <div class="checkbox-container">
                <label class="checkbox-item"><input type="checkbox" id="is_important">標記為「重要」</label>
            </div>
        </div>

        <div class="form-group">
            <label>通報單位</label>
            <input type="text" id="unit" placeholder="例如：人事室、資訊處">
        </div>

        <div class="form-group">
            <label>案由 (主旨) *</label>
            <input type="text" id="subject" placeholder="請輸入重要主旨">
        </div>

        <div class="form-group">
            <label>繳交期限</label>
            <input type="datetime-local" id="deadline">
            <div class="deadline-helper">
                <select id="deadline_date_label">
                    <option value="">日期補充 (無)</option>
                    <option value="(今天)">(今天)</option>
                    <option value="(明天)">(明天)</option>
                    <option value="---" disabled>── 本週 ──</option>
                    <option value="(本週三)">(本週三)</option>
                    <option value="(本週四)">(本週四)</option>
                    <option value="(本週五)">(本週五)</option>
                    <option value="(本週內)">(本週內)</option>
                    <option value="(盡速)">(盡速)</option>
                    <option value="---" disabled>── 下週 ──</option>
                    <option value="(下週一)">(下週一)</option>
                    <option value="(下週二)">(下週二)</option>
                    <option value="(下週三)">(下週三)</option>
                    <option value="(下週四)">(下週四)</option>
                    <option value="(下週五)">(下週五)</option>
                </select>
                <select id="deadline_time_label">
                    <option value="">時間補充 (無)</option>
                    <option value="中午前">中午前</option>
                    <option value="下班前">下班前</option>
                    <option value="會議前">會議前</option>
                    <option value="下班後">下班後</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>繳交方式 (可多選)</label>
            <select id="method_requirement">
                <option value="(都要)">(都要)</option>
                <option value="(任選一種)">(任選一種)</option>
            </select>
            <div class="checkbox-container">
                <label class="checkbox-item"><input type="checkbox" name="method" value="紙本核章">紙本核章</label>
                <label class="checkbox-item"><input type="checkbox" name="method" value="線上表單">線上表單</label>
                <label class="checkbox-item"><input type="checkbox" name="method" value="檔案回傳">檔案回傳</label>
            </div>
        </div>

        <div class="form-group">
            <label>詳細說明</label>
            <textarea id="description" rows="3" placeholder="請輸入具體細節內容..."></textarea>
        </div>

        <div class="form-group">
            <label>相關備註 (可多選)</label>
            <div class="checkbox-container">
                <label class="checkbox-item"><input type="checkbox" name="note_opt" value="無意見亦請回復無">無意見需回覆</label>
                <label class="checkbox-item"><input type="checkbox" name="note_opt" value="逾期不候">逾期不候</label>
                <label class="checkbox-item"><input type="checkbox" name="note_opt" value="請依限回覆，以利後續彙整作業">請依限回覆</label>
                <label class="checkbox-item"><input type="checkbox" name="note_opt" value="本案為預行通知，公文隨後補發">公文後補</label>
                <label class="checkbox-item full-width"><input type="checkbox" name="note_opt" value="請涉及以上項目單位回覆後，經科長核章送處總務彙整">經科長核章送處總務彙整</label>
            </div>
            <div id="custom-notes-container">
                <!-- 動態增加的備註列將顯示在此 -->
            </div>
            <button type="button" id="add-note-btn" class="secondary-btn">+ 增加自定義備註</button>
        </div>

        <button type="button" id="generate-btn">產生並自動複製</button>

        <div id="result-container">
            <span class="result-label">預覽結果：</span>
            <div id="result"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
